services:
  postgres:
    image: postgres:16-alpine
    container_name: django_etl_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-django_etl}
      POSTGRES_USER: ${POSTGRES_USER:-django_etl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-django_etl}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-django_etl} -d ${POSTGRES_DB:-django_etl}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
